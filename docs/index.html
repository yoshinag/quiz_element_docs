<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元素！覚える！ ドキュメント</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --base-background-color: #0d1117;
      --cover-background-color: #0d1117;
      --sidebar-background: #161b22;
      --sidebar-border-color: #30363d;
      --base-color: #e6edf3;
      --heading-color: #e6edf3;
      --link-color: #388bfd;
      --link-color--hover: #58a6ff;
      --code-inline-background: rgba(110, 118, 129, 0.4);
      --table-head-background: rgba(31, 111, 235, 0.15);
      --blockquote-border-color: #1f6feb;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '元素！覚える！',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '検索...',
        noData: '見つかりませんでした',
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
